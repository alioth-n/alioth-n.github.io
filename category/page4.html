<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── 基礎變數 ── */
:root {
  --bg:#0d0f14; --surface:#161a23; --surface2:#1e2330;
  --border:#2a3045; --accent:#5b8df5; --accent2:#e85d8a;
  --gold:#f5c842; --text:#e8ecf4; --text-dim:#7a85a0;
  --text-muted:#3d4560; --green:#3ecf8e; --red:#f55b5b;
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-30vh;left:-20vw;width:80vw;height:80vw;background:radial-gradient(circle,rgba(91,141,245,.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-20vh;right:-10vw;width:60vw;height:60vw;background:radial-gradient(circle,rgba(232,93,138,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 20px 60px;}

/* ── 共用 ── */
.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,5vw,2.8rem);letter-spacing:-.02em;background:linear-gradient(135deg,#5b8df5,#e85d8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.section-label{font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 26px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#5b8df5,#7b6af5);color:#fff;box-shadow:0 4px 20px rgba(91,141,245,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,141,245,.4);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;}
.btn-ghost:hover{color:var(--text);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.btn-block{width:100%;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:.9rem;cursor:pointer;width:fit-content;margin-bottom:24px;transition:color .18s;text-decoration:none;border:none;background:none;font-family:'DM Sans',sans-serif;}
.back-link:hover{color:var(--text);}
.progress-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:28px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
.word-textarea{width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;line-height:1.7;padding:14px 16px;resize:vertical;outline:none;transition:border-color .18s;}
.word-textarea:focus{border-color:var(--accent);}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:10px 24px;font-size:.9rem;z-index:999;transition:transform .3s ease;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ── Screen management ── */
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════════
   SCREEN 1 — INPUT
════════════════════════ */
.page-wrap{padding:40px 0;}
.logo-wrap{text-align:center;margin-bottom:48px;padding-top:20px;}
.logo-sub{color:var(--text-dim);font-size:.9rem;margin-top:6px;letter-spacing:.08em;text-transform:uppercase;}

.mode-card{display:flex;align-items:center;gap:20px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:20px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:10px;}
.mode-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,141,245,.06),rgba(232,93,138,.06));opacity:0;transition:opacity .2s;}
.mode-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.mode-card:hover::before,.mode-card.selected::before{opacity:1;}
.mode-card.selected{border-color:var(--accent);background:rgba(91,141,245,.04);}
.mode-icon{width:48px;height:48px;background:linear-gradient(135deg,rgba(91,141,245,.15),rgba(91,141,245,.05));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.mode-info h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.mode-info p{color:var(--text-dim);font-size:.82rem;margin-top:3px;}

/* 題數選擇 */
.qty-row{display:flex;gap:8px;margin-bottom:24px;}
.qty-btn{flex:1;padding:10px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .18s;text-align:center;}
.qty-btn:hover{border-color:var(--accent);color:var(--text);}
.qty-btn.selected{border-color:var(--accent);background:rgba(91,141,245,.08);color:var(--accent);font-weight:600;}

/* ════════════════════════
   SCREEN 2 — QUIZ
════════════════════════ */
.quiz-wrap{padding:32px 0;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.quiz-counter{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.quiz-tally{font-size:.82rem;color:var(--text-dim);display:flex;gap:14px;}
.tally-c{color:var(--green);font-weight:600;}
.tally-w{color:var(--red);font-weight:600;}

.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:18px;transition:border-color .25s;}
.quiz-card.state-correct{border-color:var(--green);box-shadow:0 0 0 3px rgba(62,207,142,.08);}
.quiz-card.state-wrong{border-color:var(--red);box-shadow:0 0 0 3px rgba(245,91,91,.08);}

.sentence-text{font-size:1.05rem;line-height:2;color:var(--text);word-break:break-word;}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:700;padding:0 5px;vertical-align:bottom;text-align:center;transition:all .2s;}
.blank.ok{border-color:var(--green);color:var(--green);}
.blank.err{border-color:var(--red);color:var(--red);text-decoration:line-through;}
.correct-reveal{color:var(--green);font-weight:700;margin-left:6px;}

/* Typing */
.typing-row{display:flex;gap:10px;margin-top:20px;}
.typing-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;padding:11px 15px;outline:none;transition:border-color .18s;}
.typing-input:focus{border-color:var(--accent);}
.typing-input:disabled{opacity:.5;cursor:not-allowed;}
.typing-input.ok{border-color:var(--green);}
.typing-input.err{border-color:var(--red);}

/* Choices */
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.choice-btn{padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;gap:10px;}
.choice-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.choice-btn:disabled{cursor:not-allowed;}
.choice-btn.ok{border-color:var(--green);background:rgba(62,207,142,.06);color:var(--green);font-weight:600;}
.choice-btn.err{border-color:var(--red);background:rgba(245,91,91,.06);color:var(--red);}
.choice-btn.show-correct{border-color:var(--green);background:rgba(62,207,142,.06);color:var(--green);font-weight:600;}
.choice-letter{width:22px;height:22px;border-radius:50%;background:var(--surface);border:1px solid var(--border);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;color:var(--text-dim);}
.choice-btn.ok .choice-letter,.choice-btn.show-correct .choice-letter{background:var(--green);border-color:var(--green);color:#fff;}
.choice-btn.err .choice-letter{background:var(--red);border-color:var(--red);color:#fff;}

.feedback{margin-top:12px;min-height:20px;font-size:.88rem;font-weight:500;}
.feedback.ok{color:var(--green);}
.feedback.err{color:var(--red);}

.next-btn-wrap{display:none;}
.next-btn-wrap.visible{display:block;animation:fadeUp .2s ease both;}

/* ════════════════════════
   SCREEN 3 — RESULT
════════════════════════ */
.result-wrap{padding:40px 0;text-align:center;}
.result-ring-wrap{position:relative;width:150px;height:150px;margin:0 auto 28px;}
.result-ring-wrap svg{transform:rotate(-90deg);}
.result-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-pct-num{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;line-height:1;}
.result-pct-label{font-size:.7rem;color:var(--text-dim);margin-top:4px;letter-spacing:.1em;text-transform:uppercase;}
.result-stats{display:flex;justify-content:center;gap:32px;margin-bottom:32px;}
.result-stat{text-align:center;}
.result-stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;}
.result-stat-label{font-size:.76rem;color:var(--text-dim);margin-top:3px;}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}

/* Wrong list */
.wrong-list{text-align:left;margin-top:8px;}
.wrong-item{background:var(--surface);border:1px solid rgba(245,91,91,.2);border-left:3px solid var(--red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin-bottom:10px;}
.wrong-item-word{font-family:'Syne',sans-serif;font-weight:700;color:var(--red);font-size:.95rem;margin-bottom:4px;}
.wrong-item-yours{font-size:.8rem;color:var(--text-muted);margin-bottom:5px;}
.wrong-item-sentence{font-size:.85rem;color:var(--text-dim);line-height:1.7;}
.wrong-item-sentence em{font-style:normal;font-weight:700;color:var(--green);}
</style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN 1: INPUT ══ -->
  <div id="s-input" class="screen active">
    <div class="page-wrap">
      <div class="logo-wrap">
        <div class="logo-title">VocabQuest</div>
        <div class="logo-sub">互動式英語單字練習系統</div>
      </div>

      <div class="section-label">單字清單</div>
      <textarea class="word-textarea" id="vocab-input"
        placeholder="每行一筆，逗號分隔：
impact, The discovery had a great impact on science.
resilience, Her resilience helped her overcome every hardship."
        oninput="onVocabInput()" style="margin-bottom:10px;"></textarea>
      <div style="font-size:.82rem;color:var(--text-dim);margin-bottom:24px;" id="word-count">尚未輸入單字</div>

      <div class="section-label">練習模式</div>
      <div class="mode-card selected" id="mc-cloze" onclick="selectMode('cloze')">
        <div class="mode-icon">📝</div>
        <div class="mode-info"><h3>克漏字測驗</h3><p>四選一，從例句找出正確單字</p></div>
      </div>
      <div class="mode-card" id="mc-typing" onclick="selectMode('typing')">
        <div class="mode-icon">⌨️</div>
        <div class="mode-info"><h3>手打填空</h3><p>看例句挖空，自己拼出正確單字</p></div>
      </div>

      <div class="section-label" style="margin-top:24px;">題數</div>
      <div class="qty-row">
        <button class="qty-btn selected" id="qty-40"  onclick="selectQty(40)">40 題</button>
        <button class="qty-btn"          id="qty-20"  onclick="selectQty(20)">20 題</button>
        <button class="qty-btn"          id="qty-10"  onclick="selectQty(10)">10 題</button>
        <button class="qty-btn"          id="qty-all" onclick="selectQty(0)">全部題目</button>
      </div>

      <div style="margin-top:8px;">
        <button class="btn btn-primary btn-block" id="start-btn" onclick="startQuiz()" disabled style="padding:16px;">開始練習 →</button>
      </div>
    </div>
  </div>

  <!-- ══ SCREEN 2: QUIZ ══ -->
  <div id="s-quiz" class="screen">
    <div class="quiz-wrap">
      <button class="back-link" onclick="goBackConfirm()">← 返回</button>

      <div class="quiz-header">
        <div class="quiz-counter"><span id="q-cur">1</span> / <span id="q-tot">—</span></div>
        <div class="quiz-tally">
          ✓ <span class="tally-c" id="q-correct">0</span>
          &nbsp;✗ <span class="tally-w" id="q-wrong">0</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="q-prog" style="width:0%"></div>
      </div>

      <div class="quiz-card" id="quiz-card">
        <div class="sentence-text" id="sentence-display">…</div>

        <!-- Typing -->
        <div id="typing-area" class="typing-row" style="display:none;">
          <input class="typing-input" id="typing-input" type="text"
                 placeholder="輸入單字…"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 onkeydown="onTypingKey(event)">
          <button class="btn btn-primary" id="confirm-btn" onclick="confirmTyping()" style="white-space:nowrap;">確認</button>
        </div>

        <!-- Cloze -->
        <div id="choices-area" class="choices-grid" style="display:none;"></div>

        <div class="feedback" id="feedback"></div>
      </div>

      <div class="next-btn-wrap" id="next-wrap">
        <button class="btn btn-outline btn-block" id="next-btn" onclick="nextQuestion()">下一題 →</button>
      </div>
    </div>
  </div>

  <!-- ══ SCREEN 3: RESULT ══ -->
  <div id="s-result" class="screen">
    <div class="result-wrap">
      <div class="section-label" style="margin-bottom:20px;">練習完成</div>

      <div class="result-ring-wrap">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="62" fill="none" stroke="var(--surface2)" stroke-width="12"/>
          <circle cx="75" cy="75" r="62" fill="none" stroke="var(--accent)" stroke-width="12"
                  stroke-linecap="round" id="ring-arc"
                  stroke-dasharray="389.6" stroke-dashoffset="389.6"
                  style="transition:stroke-dashoffset 1s ease,stroke .3s;"/>
        </svg>
        <div class="result-pct">
          <div class="result-pct-num" id="res-pct">—</div>
          <div class="result-pct-label">正確率</div>
        </div>
      </div>

      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-num" style="color:var(--green)" id="res-correct">0</div>
          <div class="result-stat-label">答對</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num" style="color:var(--red)" id="res-wrong">0</div>
          <div class="result-stat-label">答錯</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num" id="res-total">0</div>
          <div class="result-stat-label">總題數</div>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn btn-primary" onclick="restartSameMode()">再練一次</button>
        <button class="btn btn-outline" onclick="showScreen('s-input')">換設定</button>
      </div>

      <div class="wrong-list" id="wrong-list"></div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ── Helpers ──────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function parseInput(text){
  const pool=[],seen=new Set();
  for(const line of text.split('\n')){
    const t=line.trim().replace(/^\[\w+-?\w*\]\s*/,'');
    if(!t)continue;
    const ci=t.indexOf(',');
    if(ci===-1)continue;
    const word=t.slice(0,ci).trim(),sentence=t.slice(ci+1).trim();
    if(!word||!sentence)continue;
    const key=word.toLowerCase();
    if(seen.has(key))continue;
    seen.add(key);
    pool.push({word,sentence});
  }
  return pool;
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  el.classList.add('active');
  el.style.animation='none';
  requestAnimationFrame(()=>{el.style.animation='';});
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── State ─────────────────────────────────────────────────
let pool=[];
let currentMode='cloze';
let currentQty=40;   // 0 = all
let questions=[];
let qIdx=0,correctCount=0,wrongCount=0;
let answered=false;
let wrongItems=[];
const LETTERS=['A','B','C','D'];

// ── Screen 1 ──────────────────────────────────────────────
function onVocabInput(){
  pool=parseInput(document.getElementById('vocab-input').value);
  const wc=document.getElementById('word-count');
  const btn=document.getElementById('start-btn');
  if(pool.length===0){wc.textContent='尚未輸入單字';btn.disabled=true;}
  else{wc.innerHTML=`偵測到 <strong style="color:var(--accent)">${pool.length}</strong> 個單字`;btn.disabled=false;}
}

function selectMode(m){
  currentMode=m;
  ['cloze','typing'].forEach(id=>{
    document.getElementById('mc-'+id).classList.toggle('selected',id===m);
  });
}

function selectQty(n){
  currentQty=n;
  ['40','20','10','all'].forEach(id=>{
    const val=id==='all'?0:parseInt(id);
    document.getElementById('qty-'+id).classList.toggle('selected',val===n);
  });
}

function startQuiz(){
  if(pool.length===0)return;
  const limit=currentQty===0?pool.length:currentQty;
  questions=shuffle(pool).slice(0,limit);
  qIdx=0;correctCount=0;wrongCount=0;wrongItems=[];answered=false;
  showScreen('s-quiz');
  renderQuestion();
}

// ── Screen 2 ──────────────────────────────────────────────
function renderQuestion(){
  answered=false;
  const q=questions[qIdx];

  document.getElementById('q-cur').textContent=qIdx+1;
  document.getElementById('q-tot').textContent=questions.length;
  document.getElementById('q-prog').style.width=((qIdx+1)/questions.length*100)+'%';
  document.getElementById('q-correct').textContent=correctCount;
  document.getElementById('q-wrong').textContent=wrongCount;

  // Card reset
  document.getElementById('quiz-card').className='quiz-card';

  // Sentence
  const re=new RegExp('\\b'+escapeRegex(q.word)+'\\b','i');
  document.getElementById('sentence-display').innerHTML=
    q.sentence.replace(re,`<span class="blank" id="word-blank">${'_'.repeat(Math.min(q.word.length,8))}</span>`);

  // Feedback & next
  const fb=document.getElementById('feedback');
  fb.textContent='';fb.className='feedback';
  const nw=document.getElementById('next-wrap');
  nw.className='next-btn-wrap';
  document.getElementById('next-btn').textContent=
    qIdx===questions.length-1?'查看結果 →':'下一題 →';

  if(currentMode==='typing') renderTyping();
  else renderCloze(q);
}

// Typing
function renderTyping(){
  document.getElementById('typing-area').style.display='flex';
  document.getElementById('choices-area').style.display='none';
  const inp=document.getElementById('typing-input');
  const btn=document.getElementById('confirm-btn');
  inp.value='';inp.disabled=false;inp.className='typing-input';
  btn.disabled=false;
  setTimeout(()=>inp.focus(),60);
}

function onTypingKey(e){if(e.key==='Enter'&&!answered)confirmTyping();}

function confirmTyping(){
  if(answered)return;
  const q=questions[qIdx];
  const inp=document.getElementById('typing-input');
  const val=inp.value.trim();
  if(!val){inp.focus();return;}
  answered=true;
  const ok=val.toLowerCase()===q.word.toLowerCase();
  revealBlank(q.word,val,ok);
  inp.className='typing-input '+(ok?'ok':'err');
  inp.disabled=true;
  document.getElementById('confirm-btn').disabled=true;
  document.getElementById('quiz-card').className='quiz-card '+(ok?'state-correct':'state-wrong');
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'err');
  fb.textContent=ok?'✓ 正確！':'✗ 答錯了';
  tally(ok,q,val);
  showNext();
}

// Cloze
function renderCloze(q){
  document.getElementById('typing-area').style.display='none';
  const area=document.getElementById('choices-area');
  area.style.display='grid';
  const others=shuffle(questions.filter(x=>x.word.toLowerCase()!==q.word.toLowerCase())).slice(0,3).map(x=>x.word);
  const choices=shuffle([q.word,...others]);
  area.innerHTML=choices.map((w,i)=>
    `<button class="choice-btn" id="ch-${i}" onclick="confirmCloze(${i},'${w.replace(/'/g,"\\'")}')">
      <span class="choice-letter">${LETTERS[i]}</span>${w}
    </button>`
  ).join('');
}

function confirmCloze(idx,chosen){
  if(answered)return;
  answered=true;
  const q=questions[qIdx];
  const ok=chosen.toLowerCase()===q.word.toLowerCase();
  // Mark buttons
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    const w=btn.textContent.replace(/^[A-D]/,'').trim();
    const isCorrect=w.toLowerCase()===q.word.toLowerCase();
    const isChosen=btn===document.getElementById('ch-'+idx);
    if(isChosen&&ok)btn.className='choice-btn ok';
    else if(isChosen&&!ok)btn.className='choice-btn err';
    else if(isCorrect)btn.className='choice-btn show-correct';
  });
  revealBlank(q.word,chosen,ok);
  document.getElementById('quiz-card').className='quiz-card '+(ok?'state-correct':'state-wrong');
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'err');
  fb.textContent=ok?'✓ 正確！':'✗ 答錯了';
  tally(ok,q,chosen);
  showNext();
}

// Shared helpers
function revealBlank(word,typed,ok){
  const blank=document.getElementById('word-blank');
  if(!blank)return;
  blank.textContent=ok?word:typed;
  blank.className='blank '+(ok?'ok':'err');
  if(!ok){
    const span=document.createElement('span');
    span.className='correct-reveal';
    span.textContent=word;
    blank.insertAdjacentElement('afterend',span);
  }
}
function tally(ok,q,typed){
  if(ok)correctCount++;
  else{wrongCount++;wrongItems.push({word:q.word,yourAnswer:typed,sentence:q.sentence});}
}
function showNext(){
  document.getElementById('next-wrap').className='next-btn-wrap visible';
}

function nextQuestion(){
  if(qIdx>=questions.length-1){showResult();}
  else{qIdx++;renderQuestion();}
}

function goBackConfirm(){
  if(confirm('確定要離開？進度將不會儲存。'))showScreen('s-input');
}

// ── Screen 3 ──────────────────────────────────────────────
function showResult(){
  showScreen('s-result');
  const total=questions.length;
  const pct=Math.round(correctCount/total*100);
  const circ=2*Math.PI*62; // 389.6

  const arc=document.getElementById('ring-arc');
  const color=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
  arc.style.stroke=color;
  const pctEl=document.getElementById('res-pct');
  pctEl.style.color=color;

  requestAnimationFrame(()=>{
    arc.style.strokeDashoffset=circ*(1-pct/100);
  });

  // Count-up
  let cur=0;
  const step=Math.max(1,Math.ceil(pct/40));
  const timer=setInterval(()=>{
    cur=Math.min(cur+step,pct);
    pctEl.textContent=cur+'%';
    if(cur>=pct)clearInterval(timer);
  },25);

  document.getElementById('res-correct').textContent=correctCount;
  document.getElementById('res-wrong').textContent=wrongCount;
  document.getElementById('res-total').textContent=total;

  // Wrong list
  const wl=document.getElementById('wrong-list');
  if(wrongItems.length===0){
    wl.innerHTML='<p style="text-align:center;color:var(--green);font-weight:600;padding:20px 0;">🎉 全部答對！</p>';
  } else {
    wl.innerHTML=`<div class="section-label" style="margin-bottom:14px;">答錯的單字（${wrongItems.length} 題）</div>`
      +wrongItems.map(item=>{
        const re=new RegExp('\\b'+escapeRegex(item.word)+'\\b','i');
        const sentHtml=item.sentence.replace(re,`<em>${item.word}</em>`);
        return `<div class="wrong-item">
          <div class="wrong-item-word">${item.word}</div>
          <div class="wrong-item-yours">你的答案：<span style="color:var(--red)">${item.yourAnswer}</span></div>
          <div class="wrong-item-sentence">${sentHtml}</div>
        </div>`;
      }).join('');
  }
}

function restartSameMode(){
  const limit=currentQty===0?pool.length:currentQty;
  questions=shuffle(pool).slice(0,limit);
  qIdx=0;correctCount=0;wrongCount=0;wrongItems=[];
  showScreen('s-quiz');
  renderQuestion();
}
</script>
